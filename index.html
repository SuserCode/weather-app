<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather Forecast</title>
  </head>
  <body>
    <header class="site-header">
      <nav class="main-nav"></nav>
    </header>

    <main class="container">
      <div class="weather-card" id="current-weather">
        <div id="meta-data"></div>
        <!-- Current Weather Section -->
        <div class="weather-card__current">
          <div class="weather-info">
            <h2 class="weather-info__title">My Weather Forecast</h2>
            <p class="weather-info__description">Current weather conditions</p>
          </div>
          <div id="current-weather-meta-data"></div>
          <div class="weather-icon" id="weather-main-container">
            <img id="weather-main-icon" />
          </div>
        </div>

        <!-- Daily Forecast Section -->
        <div class="weather-card__forecast" id="weather-forecast">
          <div class="forecast-day">
            <h4 class="forecast-day__name">Thursday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Friday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Saturday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Sunday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Monday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Tuesday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
          <div class="forecast-day">
            <h4 class="forecast-day__name">Wednesday</h4>
            <div class="forecast-day__icon">
              <img src="" alt="Weather condition" class="forecast-day__image" />
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p class="site-footer__credit text-muted">
        Created by Mehennaoui Abdellah
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
