<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather Forecast</title>
  </head>
  <body>
    <header class="site-header">
      <nav class="main-nav"></nav>
    </header>

    <main class="container">
      <div class="weather-card" id="current-weather">
        <div id="meta-data"></div>
        <div id="meta-data">
          <input type="text" id="city-input" placeholder="Enter city name" />
        </div>
        <!-- Current Weather Section -->
        <div class="weather-card__current">
          <div class="weather-info" id="city-info"></div>
          <div id="current-weather-meta-data"></div>
          <div class="weather-icon" id="weather-main-container">
            <img id="weather-main-icon" class="weather-icon__image" />
          </div>
        </div>

        <!-- Daily Forecast Section -->
        <div class="weather-card__forecast" id="weather-forecast"></div>
      </div>
    </main>

    <footer class="site-footer">
      <p class="site-footer__credit text-muted">
        Created by Mehennaoui Abdellah
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
